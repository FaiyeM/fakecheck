name: DB Baseline (manual, F0)

# One-off, manually-triggered. Adopts EF migrations on the EXISTING live Railway
# Postgres (which has data) without recreating tables. Run the actions in order:
#   1) backup   - pg_dump the live DB, upload as a downloadable artifact (safety net)
#   2) schema   - print the live schema (schema-only) so we can confirm it matches
#                 the 20260627161257_InitialCreate migration before baselining
#   3) baseline - create __EFMigrationsHistory if missing and insert the InitialCreate
#                 row, marking the schema as already-applied. Does NOT run any CREATE.
# Requires repo secret DATABASE_URL = Railway PUBLIC connection string (.proxy.rlwy.net).

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Which step to run'
        required: true
        type: choice
        options:
          - backup
          - schema
          - baseline

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      MIGRATION_ID: '20260627161257_InitialCreate'
      PRODUCT_VERSION: '10.0.0'
    steps:
      - name: Install PostgreSQL 17 client
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          psql --version
          pg_dump --version

      - name: Backup (pg_dump custom format)
        if: ${{ inputs.action == 'backup' }}
        run: |
          STAMP=$(date +%Y%m%d_%H%M%S)
          pg_dump "$DATABASE_URL" -Fc -f "railway_backup_${STAMP}.dump"
          ls -lh railway_backup_*.dump
          echo "BACKUP_FILE=railway_backup_${STAMP}.dump" >> "$GITHUB_ENV"

      - name: Upload backup artifact
        if: ${{ inputs.action == 'backup' }}
        uses: actions/upload-artifact@v4
        with:
          name: railway-backup
          path: railway_backup_*.dump
          retention-days: 14
          if-no-files-found: error

      - name: Dump live schema (schema-only)
        if: ${{ inputs.action == 'schema' }}
        run: |
          pg_dump "$DATABASE_URL" --schema-only --no-owner --no-privileges -f live_schema.sql
          echo "================ LIVE SCHEMA ================"
          cat live_schema.sql

      - name: Upload schema artifact
        if: ${{ inputs.action == 'schema' }}
        uses: actions/upload-artifact@v4
        with:
          name: live-schema
          path: live_schema.sql
          retention-days: 14
          if-no-files-found: error

      - name: Baseline (mark InitialCreate as applied; no CREATE run)
        if: ${{ inputs.action == 'baseline' }}
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 <<SQL
          CREATE TABLE IF NOT EXISTS "__EFMigrationsHistory" (
              "MigrationId" character varying(150) NOT NULL,
              "ProductVersion" character varying(32) NOT NULL,
              CONSTRAINT "PK___EFMigrationsHistory" PRIMARY KEY ("MigrationId")
          );
          INSERT INTO "__EFMigrationsHistory" ("MigrationId", "ProductVersion")
          VALUES ('${MIGRATION_ID}', '${PRODUCT_VERSION}')
          ON CONFLICT ("MigrationId") DO NOTHING;
          SELECT * FROM "__EFMigrationsHistory";
          SQL
