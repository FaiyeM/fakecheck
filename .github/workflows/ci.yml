name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore -c Release
      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal

  mobile:
    name: Mobile (lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The Expo app is scaffolded in Phase 9, but its dependency versions are
      # reconciled by `npx expo install` in a networked env (the build sandbox
      # can't run npm). `npm ci` needs a committed package-lock.json, so gate the
      # install/lint/test steps on the lockfile to keep CI green until deps are
      # pinned and committed.
      - name: Detect mobile lockfile
        id: detect
        run: |
          if [ -f mobile/package-lock.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "mobile/package-lock.json missing — run 'npm install' in mobile/ and commit the lockfile to enable mobile CI."
          fi
      - name: Setup Node
        if: steps.detect.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Install
        if: steps.detect.outputs.exists == 'true'
        working-directory: mobile
        run: npm ci
      - name: Lint
        if: steps.detect.outputs.exists == 'true'
        working-directory: mobile
        run: npm run lint --if-present
      - name: Test
        if: steps.detect.outputs.exists == 'true'
        working-directory: mobile
        run: npm test --if-present -- --ci
